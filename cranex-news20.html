<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRANE-X News Feed</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Open Sans", sans-serif;
    background: transparent;
    color: #e0e0e0;
    margin: 0;
    padding: 0;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  .news-list { max-width: 100%; }
  .single-news {
    display: flex;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    cursor: pointer;
    transition: background 0.2s;
  }
  .single-news:hover { background: rgba(255,255,255,0.03); }
  .single-news:last-child { border-bottom: none; }
  .details { flex: 1; min-width: 0; }
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .time { font-size: 0.72em; color: rgba(255,255,255,0.4); }
  .circles { display: flex; gap: 3px; }
  .circles span {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .circle-positive { background: #3fb950; }
  .circle-negative { background: #f85149; }
  .circle-neutral  { background: #d29922; }
  .circle-mixed    { background: #58a6ff; }
  .title {
    font-size: 0.88em;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 4px;
    color: #f0f0f0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .more-s {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 0.7em;
    color: rgba(255,255,255,0.5);
    margin-bottom: 4px;
  }
  .more-s span {
    background: rgba(255,255,255,0.06);
    padding: 1px 6px;
    border-radius: 3px;
  }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 0.68em;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.6);
  }
  .tag i { margin-right: 3px; }
  .sentiment-label {
    font-size: 0.65em;
    font-weight: 600;
    padding: 1px 7px;
    border-radius: 8px;
    display: inline-block;
  }
  .sentiment-bullish { background: rgba(63,185,80,0.2); color: #3fb950; }
  .sentiment-bearish { background: rgba(248,81,73,0.2); color: #f85149; }
  .sentiment-neutral { background: rgba(210,153,34,0.2); color: #d29922; }
  .loader {
    text-align: center;
    padding: 30px;
    color: rgba(255,255,255,0.3);
  }
  .loader .lds-ring {
    display: inline-block; position: relative; width: 40px; height: 40px;
  }
  .loader .lds-ring div {
    box-sizing: border-box; display: block; position: absolute;
    width: 32px; height: 32px; margin: 4px; border: 3px solid rgba(255,255,255,0.2);
    border-radius: 50%; animation: lds-ring 1.2s cubic-bezier(0.5,0,0.5,1) infinite;
    border-color: rgba(255,255,255,0.2) transparent transparent transparent;
  }
  .loader .lds-ring div:nth-child(1) { animation-delay: -0.45s; }
  .loader .lds-ring div:nth-child(2) { animation-delay: -0.3s; }
  .loader .lds-ring div:nth-child(3) { animation-delay: -0.15s; }
  @keyframes lds-ring {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .no-result, .error-result {
    text-align: center; padding: 30px; font-size: 0.85em; color: rgba(255,255,255,0.3);
  }
  .hide { display: none; }
</style>
</head>
<body>
<div class="news-list" id="news-list">
  <div class="loader" id="loader">
    <div class="lds-ring"><div></div><div></div><div></div><div></div></div>
  </div>
  <p class="no-result hide">No news available</p>
  <p class="error-result hide">Could not load news feed</p>
</div>

<script src="config.js"></script>
<script>
const API_URL = (typeof CRANEX_API_URL !== 'undefined')
  ? CRANEX_API_URL.replace('multisentiment-cranex', 'multisentiment-cranex-news')
  : 'https://tradeflags.com/NewsFeed/public/api/multisentiment-cranex-news';

function fromNow(dateStr) {
  const date = new Date(dateStr);
  const now = Date.now();
  const diff = Math.abs(now - date.getTime());
  const hours = Math.floor(diff / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);
  let str = '';
  if (hours) str += hours + 'hr ';
  if (minutes) str += minutes + 'min ';
  if (!hours && !minutes) str += seconds + 'secs';
  return str + ' ago';
}

function sentimentClass(polarity) {
  if (polarity === null || polarity === undefined) return 'neutral';
  if (polarity > 0.3) return 'bullish';
  if (polarity < -0.3) return 'bearish';
  return 'neutral';
}

function sentimentLabel(polarity) {
  if (polarity === null || polarity === undefined) return '~';
  if (polarity > 0.3) return 'Bullish';
  if (polarity < -0.3) return 'Bearish';
  return 'Neutral';
}

function circleOpacity(val) {
  const v = Math.abs(val || 0);
  return Math.min(1, v * 3);
}

function cColor(v) {
  if (v === null || v === undefined) return '#555';
  if (v > 0) return '#3fb950';
  return '#f85149';
}

function truncate(str, n) {
  if (!str) return '';
  return str.length > n ? str.slice(0, n) + '...' : str;
}

function renderArticles(articles) {
  const container = document.getElementById('news-list');
  document.getElementById('loader').classList.add('hide');
  document.querySelector('.no-result').classList.add('hide');
  document.querySelector('.error-result').classList.add('hide');

  if (!articles || articles.length === 0) {
    document.querySelector('.no-result').classList.remove('hide');
    return;
  }

  articles.forEach(a => {
    const polarity = parseFloat(a.sentiment_polarity) || 0;
    const sentClass = sentimentClass(polarity);
    const sentLabel = sentimentLabel(polarity);
    const esf = a.esf ? `ES ${parseFloat(a.esf).toFixed(1)}` : null;
    const nqf = a.nqf ? `NQ ${parseFloat(a.nqf).toFixed(1)}` : null;
    const btc = a.btc ? `BTC ${parseFloat(a.btc).toFixed(0)}` : null;
    const eth = a.eth ? `ETH ${parseFloat(a.eth).toFixed(0)}` : null;
    const prices = [esf, nqf, btc, eth].filter(Boolean);

    const tags = [];
    try {
      const parsed = typeof a.tags === 'string' ? JSON.parse(a.tags) : (a.tags || []);
      if (Array.isArray(parsed)) {
        parsed.slice(0, 3).forEach(t => tags.push(t));
      }
    } catch(e) {}

    const symbols = [];
    try {
      const parsed = typeof a.symbols === 'string' ? JSON.parse(a.symbols) : (a.symbols || []);
      if (Array.isArray(parsed)) {
        parsed.slice(0, 3).forEach(s => symbols.push(s.replace('.US','')));
      }
    } catch(e) {}

    const el = document.createElement('a');
    el.className = 'single-news';
    el.href = a.httplink || '#';
    el.target = '_blank';
    el.rel = 'noopener';

    // Details
    const details = document.createElement('div');
    details.className = 'details';

    // Top row: time + circles
    const top = document.createElement('div');
    top.className = 'top';
    const time = document.createElement('span');
    time.className = 'time';
    time.textContent = fromNow(a.date_utc);

    // Sentiment badge
    const badge = document.createElement('span');
    badge.className = 'sentiment-label sentiment-' + sentClass;
    badge.textContent = sentLabel + ' ' + polarity.toFixed(2);

    top.appendChild(time);
    top.appendChild(badge);
    details.appendChild(top);

    // Title
    const title = document.createElement('div');
    title.className = 'title';
    title.textContent = a.title || '';
    details.appendChild(title);

    // Prices row
    if (prices.length > 0) {
      const priceRow = document.createElement('div');
      priceRow.className = 'more-s';
      prices.forEach(p => {
        const span = document.createElement('span');
        span.textContent = p;
        priceRow.appendChild(span);
      });
      details.appendChild(priceRow);
    }

    // Tags
    const tagContainer = document.createElement('div');
    tagContainer.className = 'tags';
    tags.forEach(t => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.innerHTML = '<i class="fas fa-tag"></i> ' + t;
      tagContainer.appendChild(tag);
    });
    symbols.forEach(s => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.innerHTML = '<i class="fas fa-chart-line"></i> ' + s;
      tagContainer.appendChild(tag);
    });
    details.appendChild(tagContainer);

    el.appendChild(details);
    container.appendChild(el);
  });
}

function fetchNews() {
  fetch(API_URL)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      const articles = Array.isArray(data) ? data : (data.articles || data.data || []);
      renderArticles(articles);
    })
    .catch(err => {
      document.getElementById('loader').classList.add('hide');
      document.querySelector('.error-result').classList.remove('hide');
      document.querySelector('.error-result').textContent = 'Error: ' + err.message;
    });
}

fetchNews();
</script>
</body>
</html>
